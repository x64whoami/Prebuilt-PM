# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: Gradle Package

on:
  push:
    branches:
      - master
      - mc/**
  pull_request:
    branches:
      - master
      - mc/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build jar
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 8 for legacy branches
        if: startsWith(github.ref_name, 'mc/1.12') || github.ref_name == 'master'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: gradle

      - name: Set up Java 17 for modern branches
        if: startsWith(github.ref_name, 'mc/1.20.1')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew build --stacktrace

      - name: Upload jar artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: primitivemobswondersapped-${{ github.run_number }}-${{ github.sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar
          if-no-files-found: error
